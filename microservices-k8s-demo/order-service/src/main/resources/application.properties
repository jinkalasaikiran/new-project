spring.application.name=order-service
server.port=5004
management.endpoints.web.exposure.include=health,info

# Downstream service URLs. In Kubernetes these resolve via Service DNS names,
# e.g. http://user-service:5001. Overridable via environment variables.
user.service.url=${USER_SERVICE_URL:http://localhost:5001}
cart.service.url=${CART_SERVICE_URL:http://localhost:5003}
notification.service.url=${NOTIFICATION_SERVICE_URL:http://localhost:5005}
