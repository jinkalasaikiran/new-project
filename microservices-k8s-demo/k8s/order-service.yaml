apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: microservices-demo
  labels:
    app: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: YOUR_DOCKERHUB_USERNAME/order-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5004
          env:
            - name: PORT
              value: "5004"
            - name: USER_SERVICE_URL
              value: "http://user-service:5001"
            - name: CART_SERVICE_URL
              value: "http://cart-service:5003"
            - name: NOTIFICATION_SERVICE_URL
              value: "http://notification-service:5005"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5004
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: microservices-demo
spec:
  selector:
    app: order-service
  ports:
    - port: 5004
      targetPort: 5004
  # Exposed as NodePort so it's reachable from outside the cluster (e.g. via minikube)
  type: NodePort
