apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: microservices-demo
  labels:
    app: cart-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: YOUR_DOCKERHUB_USERNAME/cart-service:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5003
          env:
            - name: PORT
              value: "5003"
            # Kubernetes DNS resolves this to the product-service ClusterIP
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:5002"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5003
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: cart-service
  namespace: microservices-demo
spec:
  selector:
    app: cart-service
  ports:
    - port: 5003
      targetPort: 5003
  type: ClusterIP
